name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      
      - name: Build Backend
        run: |
          cd api-server
          npm ci
          npm run build
      
      - name: Build Frontend
        run: |
          cd ohanna
          npm ci
          npm run build
      
      - name: Deploy to Production
        run: |
          echo "Deployment configuration needed"
          echo "Configure deployment target in GitHub Actions secrets"
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
