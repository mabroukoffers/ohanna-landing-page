name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'api-server/package-lock.json'
      
      - name: Backend Type Check
        run: |
          cd api-server
          npm ci
          npm run typecheck
        continue-on-error: true
      
      - name: Check for console errors
        run: |
          echo "Checking for common issues..."
          grep -r "console.log" api-server/src --include="*.ts" || true
          grep -r "any" api-server/src --include="*.ts" | grep -v "any\[\]" || true
  
  frontend-quality:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'ohanna/package-lock.json'
      
      - name: Frontend Type Check
        run: |
          cd ohanna
          npm ci
          npm run typecheck
        continue-on-error: true
