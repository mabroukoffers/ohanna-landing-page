kind = "mobile"
previewPath = "/ohanna-mobile/"
title = "OHANNA Mobile"
version = "1.0.0"
id = "artifacts/ohanna-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/ohanna-mobile/" ]
localPort = 20706

[services.development]
run = "pnpm --filter @workspace/ohanna-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ohanna-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ohanna-mobile", "run", "serve" ]

[services.env]
PORT = "20706"
BASE_PATH = "/ohanna-mobile/"
